{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Formulários de Permuta Gerados</h2>
    <div class="list-group mt-3">
        {% for arquivo in arquivos %}
        <a href="{{ arquivo.caminho }}" class="list-group-item list-group-item-action" target="_blank">
            {{ arquivo.nome }}
        </a>
        {% empty %}
        <p>Nenhum arquivo de permuta encontrado.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
