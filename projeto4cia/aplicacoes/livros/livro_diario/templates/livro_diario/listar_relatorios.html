{% extends 'base.html' %}
{% load static %}

{% block title %}Listar Relatórios - Livro Diário{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-files me-2"></i>Relatórios do Livro Diário</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Data de Criação</th>
                            <th>Data da Escala</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-relatorios">
                        <tr>
                            <td colspan="4" class="text-center text-muted">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <br>Carregando relatórios...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-secondary" onclick="window.history.back()">
                    <i class="bi bi-arrow-left"></i> Voltar
                </button>
                <button class="btn btn-success" onclick="location.reload()">
                    <i class="bi bi-arrow-repeat"></i> Atualizar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
async function carregarRelatorios() {
    try {
        const response = await fetch("{% url 'livro_diario:listar_relatorios' %}", {
    headers: {
        'X-Requested-With': 'XMLHttpRequest'
    }
});
        const data = await response.json();
        
        const tbody = document.getElementById('tabela-relatorios');
        
        if (data.relatorios && data.relatorios.length > 0) {
            tbody.innerHTML = '';
            
            data.relatorios.forEach(relatorio => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${relatorio.id}</td>
                    <td>${relatorio.data}</td>
                    <td>${relatorio.data_escala}</td>
                    <td>
                        <a href="/livros/diario/visualizar/${relatorio.id}/" class="btn btn-sm btn-primary">
                            <i class="bi bi-eye"></i> Visualizar
                        </a>
                    </td>
                `;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum relatório encontrado</td></tr>';
        }
    } catch (error) {
        console.error('Erro:', error);
        const tbody = document.getElementById('tabela-relatorios');
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Erro ao carregar relatórios</td></tr>';
    }
}

document.addEventListener('DOMContentLoaded', carregarRelatorios);
</script>
{% endblock %}
